<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You - Prime Advertere</title>
  <style>
    :root {
      color-scheme: dark;
      --bg-dark: #020617;
      --bg-mid: #0f172a;
      --text-soft: #cbd5e1;
      --primary: #0284c7;
      --primary-hover: #0369a1;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, var(--bg-dark) 0%, var(--bg-mid) 100%);
      color: #ffffff;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page-shell {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .page-shell::before,
    .page-shell::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      filter: blur(28px);
      opacity: 0.72;
      pointer-events: none;
    }

    .page-shell::before {
      width: 420px;
      height: 420px;
      top: -120px;
      left: -100px;
      background: rgba(14, 165, 233, 0.26);
    }

    .page-shell::after {
      width: 360px;
      height: 360px;
      right: -120px;
      bottom: -80px;
      background: rgba(37, 99, 235, 0.2);
    }

    .thank-you-content {
      position: relative;
      z-index: 1;
      width: min(760px, 100%);
      text-align: center;
    }

    .logo-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 34px;
    }

    .logo-wrap img {
      width: auto;
      height: 108px;
    }

    h1 {
      margin: 0;
      font-size: clamp(38px, 5vw, 56px);
      line-height: 1.08;
    }

    .summary {
      margin: 20px auto 0;
      max-width: 620px;
      font-size: 20px;
      line-height: 1.8;
      color: var(--text-soft);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      margin-top: 34px;
      justify-content: center;
    }

    .button-primary,
    .button-secondary {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      padding: 16px 28px;
      font-size: 16px;
      font-weight: 700;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }

    .button-primary {
      background: var(--primary);
    }

    .button-primary:hover {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .button-secondary {
      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(255, 255, 255, 0.02);
    }

    .button-secondary:hover {
      border-color: rgba(255, 255, 255, 0.3);
      background: rgba(255, 255, 255, 0.05);
      transform: translateY(-1px);
    }

    @media (max-width: 720px) {
      .logo-wrap img {
        height: 84px;
      }

      .summary {
        font-size: 18px;
      }
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <div class="thank-you-content">
      <div class="logo-wrap">
        <img src="../assets/images/prime/logo.png?v=2" alt="Prime Advertere" />
      </div>
      <h1>Thank You</h1>
      <p class="summary">
        Thanks for reaching out. We received your submission, and our team will follow up with you soon.
      </p>

      <div class="actions">
        <a href="/" class="button-primary">Return Home</a>
        <a href="/#contact" class="button-secondary">Book a Free Demo</a>
      </div>
    </div>
  </div>
</body>
</html>
